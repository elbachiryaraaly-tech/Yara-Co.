services:
  postgres:
    image: postgres:16-alpine
    container_name: yaraluxe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yaraluxe
    ports:
      - "5433:5432"
    volumes:
      - yaraluxe_pgdata:/var/lib/postgresql/data

volumes:
  yaraluxe_pgdata:
